server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Vite SPA fallback
    location / {
        try_files $uri /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        access_log off;
    }
}